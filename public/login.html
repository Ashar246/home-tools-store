<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>تسجيل دخول المنجر</title>
  <style>
    body { font-family: Arial; direction: rtl; margin: 20px; }
    form { max-width: 300px; margin: auto; display: flex; flex-direction: column; gap: 10px; }
    input, button { padding: 8px; font-size: 14px; }
    button { background: blue; color: white; border: none; cursor: pointer; }
    button:hover { background: darkblue; }
  </style>
</head>
<body>
  <h2>تسجيل دخول المنجر</h2>
  <form id="loginForm">
    <input type="text" id="username" placeholder="اسم المستخدم" required>
    <input type="password" id="password" placeholder="كلمة المرور" required>
    <button type="submit">🔑 دخول</button>
  </form>
  <p id="message"></p>
  <script src="login.js"></script>
</body>
</html>
